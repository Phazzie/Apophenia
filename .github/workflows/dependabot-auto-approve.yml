name: Auto-Approve Dependabot

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-approve:
    name: Auto-approve Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v2
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"

    - name: Auto-approve patch and minor updates
      if: |
        steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
        steps.metadata.outputs.update-type == 'version-update:semver-minor'
      run: |
        gh pr review --approve "$PR_URL"
        echo "✅ Auto-approved ${{ steps.metadata.outputs.update-type }} update"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment on major updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-major'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ⚠️ Major Version Update Detected

            **Package:** ${{ steps.metadata.outputs.dependency-names }}
            **Update Type:** Major version update

            This requires manual review due to potential breaking changes.

            Please review the changelog and test thoroughly before merging.`
          });

  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    needs: dependabot-auto-approve
    if: github.actor == 'dependabot[bot]'

    steps:
    - name: Get Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v2
      with:
        github-token: "${{ secrets.GITHUB_TOKEN }}"

    - name: Wait for CI checks
      run: |
        echo "⏳ Waiting for CI checks to complete..."
        sleep 30

    - name: Enable auto-merge for patch updates
      if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
      run: |
        gh pr merge --auto --squash "$PR_URL"
        echo "✅ Auto-merge enabled for patch update"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment on auto-merge status
      uses: actions/github-script@v7
      with:
        script: |
          const updateType = '${{ steps.metadata.outputs.update-type }}';
          let message = '';

          if (updateType === 'version-update:semver-patch') {
            message = '✅ **Auto-merge enabled** - This patch update will merge automatically once all checks pass.';
          } else if (updateType === 'version-update:semver-minor') {
            message = '✅ **Auto-approved** - This minor update has been approved but requires manual merge.';
          } else {
            message = '⚠️ **Manual review required** - This major update needs careful review before merging.';
          }

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🤖 Dependabot Automation Status\n\n${message}\n\n**Update Type:** \`${updateType}\``
          });
