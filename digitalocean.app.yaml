# Apophenia Application Specification for DigitalOcean App Platform
name: apophenia
region: nyc

services:
  # Frontend Service (Nginx)
  # Serves the static React app. It is built using the Dockerfile located
  # at 'docker/frontend/Dockerfile'. The build context is the repo root.
  - name: frontend
    dockerfile_path: docker/frontend/Dockerfile
    source_dir: .
    http_port: 80
    instance_count: 1
    instance_size_slug: apps-xxs # Minimal size for serving static files
    routes:
      - path: /
    envs:
      # These secrets are required at BUILD time for Vite to bundle the app correctly.
      # They must be configured in the DigitalOcean App Platform UI.
      - key: VITE_GEMINI_API_KEY
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_XAI_API_KEY
        scope: BUILD_TIME
        type: SECRET

  # Backend Service (Node.js)
  # Runs the Express API server. It is built using the Dockerfile located
  # at 'docker/backend/Dockerfile'. The build context is the repo root.
  - name: backend
    dockerfile_path: docker/backend/Dockerfile
    source_dir: .
    http_port: 3001
    instance_count: 1
    instance_size_slug: apps-xs # A small instance for the Node.js API
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "3001"
      # These secrets are required at RUN time for the API to function.
      # They must be configured in the DigitalOcean App Platform UI.
      - key: XAI_API_KEY
        type: SECRET
      - key: GEMINI_API_KEY
        type: SECRET
      # Use a bindable variable to automatically set the CORS origin to the app's public URL.
      - key: CORS_ORIGIN
        value: "${APP_URL}"

# Configure alerts for deployment and domain failures.
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED