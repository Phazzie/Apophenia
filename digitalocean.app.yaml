# Apophenia Deployment Configuration for DigitalOcean App Platform
# This configuration defines a single service that builds the frontend and runs the backend server.
name: apophenia
region: nyc
services:
  - name: apophenia-service
    # GitHub configuration
    github:
      repo: Phazzie/Apophenia
      branch: main # It is recommended to deploy from 'main' or a 'production' branch
      deploy_on_push: true

    # Build and run commands
    # First, install all dependencies and build the frontend assets.
    # Then, the start command runs the production server.
    build_command: npm install && npm run build
    run_command: npm run start:prod

    # Service configuration
    http_port: 3001
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-1gb

    # Routes - this single service will handle all traffic, including API calls and serving static assets.
    routes:
      - path: /

    # Environment variables
    envs:
      - key: NODE_ENV
        value: production
      - key: SERVE_STATIC
        value: "true" # Tells the Express server to serve the built frontend from the 'dist' directory
      - key: VITE_GEMINI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: VITE_XAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

# Alerting rules
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED