name: PR Preview on GitHub Pages

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write # To comment with the preview URL
  pages: write # To deploy to Pages
  id-token: write # To verify the deployment token

jobs:
  build:
    name: Build Static Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages
        # Set the base URL for Vite so that assets are loaded correctly from the subdirectory.
        # e.g., https://<org>.github.io/<repo>/
        run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post preview link as a comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const preview_url = "${{ steps.deployment.outputs.page_url }}";
            const comment_body = `🚀 **Frontend Preview:** [${preview_url}](${preview_url})`;

            // Check for existing comments from this action
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });
            const existing_comment = comments.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('🚀 **Frontend Preview:**')
            );

            if (existing_comment) {
              // Update the existing comment
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing_comment.id,
                body: comment_body
              });
            } else {
              // Create a new comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: comment_body
              });
            }