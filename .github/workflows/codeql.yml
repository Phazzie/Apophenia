name: CodeQL Advanced Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Use security-extended for maximum detection
        queries: security-extended,security-and-quality
        # Custom config for TypeScript/React
        config: |
          name: "Apophenia Security Scan"
          queries:
            - uses: security-extended
            - uses: security-and-quality
          paths-ignore:
            - node_modules
            - dist
            - coverage
            - '**/*.test.ts'
            - '**/*.test.tsx'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project for analysis
      run: |
        npm run build || echo "Build failed but continuing analysis"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
        upload: true

    - name: CodeQL Results Summary
      if: always()
      run: |
        echo "## 🔒 CodeQL Security Analysis Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Language:** ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
        echo "**Queries:** security-extended, security-and-quality" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Check the Security tab for detailed results." >> $GITHUB_STEP_SUMMARY

  # Auto-triage security findings
  triage-findings:
    name: Auto-Triage Security Findings
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check for critical vulnerabilities
      uses: actions/github-script@v7
      with:
        script: |
          // Query for open code scanning alerts
          const alerts = await github.rest.codeScanning.listAlertsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            severity: 'critical'
          });

          if (alerts.data.length > 0) {
            core.warning(`Found ${alerts.data.length} critical security alerts!`);

            // Create summary
            let summary = '## 🚨 Critical Security Alerts Found\n\n';
            alerts.data.slice(0, 5).forEach(alert => {
              summary += `- **${alert.rule.description}** in ${alert.most_recent_instance.location.path}\n`;
            });

            core.summary.addRaw(summary).write();
          } else {
            core.info('✅ No critical security alerts found');
          }
