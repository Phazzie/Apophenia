name: Deploy to DigitalOcean App Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional: The git SHA of a previous successful build to roll back to.'
        required: false
        default: ''

env:
  DOCR_REGISTRY: apophenia-registry
  DO_APP_NAME: apophenia

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
      is_rollback: ${{ steps.vars.outputs.is_rollback }}
    steps:
      - name: Set workflow variables
        id: vars
        run: |
          if [[ "${{ github.event.inputs.image_tag }}" != "" ]]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "is_rollback=true" >> $GITHUB_OUTPUT
            echo "Preparing rollback to tag: ${{ github.event.inputs.image_tag }}"
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "is_rollback=false" >> $GITHUB_OUTPUT
            echo "Preparing new build with tag: ${{ github.sha }}"
          fi

  build:
    name: Build, Push, and Attest Images
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.is_rollback == 'false'
    permissions:
      contents: read
      id-token: write # For signing
      packages: write # For pushing to registry
      actions: read # For slsa-generator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/frontend/Dockerfile
          push: true
          tags: registry.digitalocean.com/${{ env.DOCR_REGISTRY }}/frontend:${{ needs.prepare.outputs.image_tag }}

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/backend/Dockerfile
          push: true
          tags: registry.digitalocean.com/${{ env.DOCR_REGISTRY }}/backend:${{ needs.prepare.outputs.image_tag }}

      - name: Generate SLSA provenance for frontend
        id: slsa_frontend
        uses: slsa-framework/slsa-github-generator@v1
        with:
          subject-name: "registry.digitalocean.com/${{ env.DOCR_REGISTRY }}/frontend"
          subject-digest: ${{ steps.build_frontend.outputs.digest }}
          provenance-name: "frontend.provenance"

      - name: Upload frontend provenance
        uses: actions/upload-artifact@v4
        with:
          name: frontend-provenance
          path: ${{ steps.slsa_frontend.outputs.provenance-path }}

      - name: Generate SLSA provenance for backend
        id: slsa_backend
        uses: slsa-framework/slsa-github-generator@v1
        with:
          subject-name: "registry.digitalocean.com/${{ env.DOCR_REGISTRY }}/backend"
          subject-digest: ${{ steps.build_backend.outputs.digest }}
          provenance-name: "backend.provenance"

      - name: Upload backend provenance
        uses: actions/upload-artifact@v4
        with:
          name: backend-provenance
          path: ${{ steps.slsa_backend.outputs.provenance-path }}

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: always() && (needs.build.result == 'success' || (needs.build.result == 'skipped' && needs.prepare.outputs.is_rollback == 'true'))
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.app_url }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get App ID
        id: get_app_id
        run: echo "APP_ID=$(doctl apps list --format ID,Spec.Name | grep '${{ env.DO_APP_NAME }}' | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Get live app spec
        run: doctl apps spec get ${{ steps.get_app_id.outputs.APP_ID }} > live-spec.yaml

      - name: Install yq
        run: sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

      - name: Update app spec to use new image
        run: |
          yq -i '.services[] | select(.name == "frontend").image.tag = "${{ needs.prepare.outputs.image_tag }}"' live-spec.yaml
          yq -i '.services[] | select(.name == "backend").image.tag = "${{ needs.prepare.outputs.image_tag }}"' live-spec.yaml

      - name: Update app spec and trigger deployment
        id: deploy
        run: |
          doctl apps update ${{ steps.get_app_id.outputs.APP_ID }} --spec live-spec.yaml
          echo "Deployment triggered. Waiting for completion..."
          doctl apps deployment wait ${{ steps.get_app_id.outputs.APP_ID }}
          APP_URL=$(doctl apps get ${{ steps.get_app_id.outputs.APP_ID }} --format LiveURL --no-header)
          echo "Deployment successful! App URL: $APP_URL"
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

  playwright_smoke_test:
    name: Playwright Smoke Test
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: needs.deploy_staging.result == 'success'
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy # Use a recent Playwright image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Playwright smoke test
        id: test
        run: python verify.py
        env:
          BASE_URL: ${{ needs.deploy_staging.outputs.app_url }}

      - name: Annotate failure
        if: failure() && steps.test.outcome == 'failure'
        run: |
          echo "::error file=verify.py,line=1,col=1::Playwright smoke test failed. Check the 'Playwright Report' artifact for details and screenshots."

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-error-screenshot
          path: error_screenshot.png

      - name: Upload verification screenshot on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-verification-screenshot
          path: verification.png

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, deploy_staging]
    if: needs.deploy_staging.result == 'success'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.app_url }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get App ID
        id: get_app_id
        run: echo "APP_ID=$(doctl apps list --format ID,Spec.Name | grep '${{ env.DO_APP_NAME }}' | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Get live app spec
        run: doctl apps spec get ${{ steps.get_app_id.outputs.APP_ID }} > live-spec.yaml

      - name: Install yq
        run: sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

      - name: Update app spec to use new image
        run: |
          yq -i '.services[] | select(.name == "frontend").image.tag = "${{ needs.prepare.outputs.image_tag }}"' live-spec.yaml
          yq -i '.services[] | select(.name == "backend").image.tag = "${{ needs.prepare.outputs.image_tag }}"' live-spec.yaml

      - name: Update app spec and trigger production deployment
        id: deploy
        run: |
          doctl apps update ${{ steps.get_app_id.outputs.APP_ID }} --spec live-spec.yaml
          echo "Production deployment triggered. Waiting for completion..."
          doctl apps deployment wait ${{ steps.get_app_id.outputs.APP_ID }}
          APP_URL=$(doctl apps get ${{ steps.get_app_id.outputs.APP_ID }} --format LiveURL --no-header)
          echo "Deployment successful! App URL: $APP_URL"
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT