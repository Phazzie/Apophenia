name: 'Setup Node.js with Smart Caching'
description: 'Sets up Node.js with intelligent multi-layer caching for maximum speed'
author: 'Apophenia Team'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: true
    default: '20.x'
  enable-profiling:
    description: 'Enable dependency installation profiling'
    required: false
    default: 'false'

outputs:
  cache-hit:
    description: 'Whether cache was restored'
    value: ${{ steps.cache-node-modules.outputs.cache-hit }}
  install-time:
    description: 'Time taken to install dependencies (ms)'
    value: ${{ steps.profile.outputs.install-time }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Get npm cache directory
      id: npm-cache-dir
      shell: bash
      run: |
        echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

    - name: Cache node_modules (Layer 1 - Exact match)
      id: cache-node-modules
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ${{ steps.npm-cache-dir.outputs.dir }}
        key: ${{ runner.os }}-node-${{ inputs.node-version }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ inputs.node-version }}-
          ${{ runner.os }}-node-

    - name: Cache TypeScript build info (Layer 2)
      uses: actions/cache@v4
      with:
        path: |
          **/*.tsbuildinfo
          .eslintcache
        key: ${{ runner.os }}-typescript-${{ hashFiles('**/tsconfig.json', '**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-typescript-

    - name: Start profiling
      if: inputs.enable-profiling == 'true'
      id: start-profile
      shell: bash
      run: |
        echo "start_time=$(date +%s%3N)" >> $GITHUB_OUTPUT

    - name: Install dependencies (if cache miss)
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "📦 Cache miss - installing dependencies..."
        npm ci --prefer-offline --no-audit
        echo "✅ Dependencies installed"

    - name: Verify installation
      if: steps.cache-node-modules.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "🚀 Cache hit - verifying installation..."
        # Quick verification without full reinstall
        node --version
        npm --version
        echo "✅ Installation verified from cache"

    - name: End profiling
      if: inputs.enable-profiling == 'true'
      id: profile
      shell: bash
      run: |
        end_time=$(date +%s%3N)
        start_time=${{ steps.start-profile.outputs.start_time }}
        install_time=$((end_time - start_time))
        echo "install-time=$install_time" >> $GITHUB_OUTPUT
        echo "⏱️  Installation time: ${install_time}ms"

    - name: Cache statistics
      shell: bash
      run: |
        if [ "${{ steps.cache-node-modules.outputs.cache-hit }}" == "true" ]; then
          echo "📊 Cache Statistics:"
          echo "  ✅ node_modules restored from cache"
          echo "  ⚡ Saved ~2-3 minutes of install time"
        else
          echo "📊 Cache Statistics:"
          echo "  ❌ Cache miss - full npm ci performed"
          echo "  💡 Next run will use cached dependencies"
        fi
