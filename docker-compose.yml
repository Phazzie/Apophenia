# Docker Compose for local Apophenia development

services:
  # Frontend service - React app served by nginx
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      # These are build-time environment variables
      # They get baked into the frontend build
      - VITE_API_BASE_URL=/api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # Backend service - Express API server
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - CORS_ORIGIN=http://localhost:8080
      - SERVE_STATIC=false
      # API keys from environment or .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3001/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => { process.exit(1); });"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    # volumes:
      # Optional: mount for development (uncomment if needed)
      # - ./server.js:/app/server.js:ro
      # - ./server:/app/server:ro

# Optional: shared network for service communication
networks:
  default:
    name: apophenia-network